version: v0.1-first-batch
updated_at: 2026-03-30T22:55:00+08:00
policy: |
  黑名单用于阻断高污染、高侵权或高误导来源进入核心库。
  命中黑名单的内容默认仅可进入 pending/ 或反例池，不得直接进入正式可召回资产。
rules:
  - pattern: wenku.baidu.com
    reason: 文库汇编与二次上传较多，版权状态和原始出处常不清晰。
    action: reject_core_ingestion
  - pattern: mbalib.com
    reason: 文档转载与整理稿较多，正式发布属性弱。
    action: reject_core_ingestion
  - pattern: 360doc.com
    reason: 个人转载聚合站，来源链复杂。
    action: reject_core_ingestion
  - pattern: mp.weixin.qq.com
    reason: 公众号整理稿/培训稿/AI 改写稿混杂，默认不直入核心库。
    action: pending_or_negative_only
  - pattern: zhihu.com
    reason: 问答与经验贴不具正式文件属性。
    action: reject_core_ingestion
  - pattern: bbs|forum|tieba|doc88|book118
    reason: 论坛与资料站噪声高、来源不可追溯。
    action: reject_core_ingestion
heuristics:
  - name: no_publisher
    trigger: 页面无法识别发布主体或发文机关
    action: pending
  - name: no_publish_date
    trigger: 页面无法识别发布时间
    action: pending
  - name: ai_smell
    trigger: 套话密集、结构机械重复、错误堆叠、无可靠出处
    action: reject_core_ingestion
